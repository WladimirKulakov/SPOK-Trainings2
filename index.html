<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Спок Тренировки</title>
    <style>
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app {
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }
        h1, h2 { text-align: center; color: #1e2a3a; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        button:disabled { background: #ccc; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        .exercise-card {
            background: white;
            border-radius: 28px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            margin-bottom: 0;
        }
        .comment {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #4CAF50;
        }
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item {
            background: #f0f0f0;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .top-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="authScreen">
        <h2>🔐 Вход / Регистрация</h2>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
        <button id="registerBtn" style="background:#ff9800;">Зарегистрироваться</button>
    </div>

    <div id="genderScreen" style="display:none;">
        <h2>👋 Выбери пол</h2>
        <button class="gender-btn" data-gender="male">♂️ Мужчина</button>
        <button class="gender-btn" data-gender="female">♀️ Женщина</button>
    </div>

    <div id="profileScreen" style="display:none;">
        <h2>📝 Расскажи о себе</h2>
        <input type="number" id="height" placeholder="Рост (см)">
        <input type="number" id="weight" placeholder="Вес (кг)">
        <input type="number" id="age" placeholder="Возраст">
        <select id="level">
            <option value="beginner">Новичок</option>
            <option value="intermediate">Средний</option>
            <option value="advanced">Профи</option>
        </select>
        <select id="goal">
            <option value="strength">Сила</option>
            <option value="muscle_gain">Масса</option>
            <option value="weight_loss">Похудение</option>
            <option value="maintenance">Поддержание</option>
        </select>
        <button id="saveProfileBtn" disabled>Сохранить</button>
        <button id="backToGenderBtn" style="background:#ff9800;">Назад</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="top-bar">
            <h1>🏋️ Спок Тренировки</h1>
            <div>
                <button id="historyBtn">📋 История</button>
                <button id="logoutBtn" style="background:#ff9800;">🚪 Выйти</button>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <select id="muscle1" style="flex:1;">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <span style="font-size:24px;">+</span>
            <select id="muscle2" style="flex:1;">
                <option value="chest">Грудь</option>
                <option value="back">Спина</option>
                <option value="legs">Ноги</option>
                <option value="shoulders">Плечи</option>
                <option value="biceps">Бицепс</option>
                <option value="triceps">Трицепс</option>
            </select>
            <button id="applyBtn">Применить</button>
        </div>
        <div id="exercisesContainer"></div>
        <button id="addExerciseBtn">➕ Добавить упражнение</button>
        <button id="saveBtn">💾 Сохранить тренировку</button>
    </div>
</div>

<script>
    let currentUser = null, currentGender = null, userProfile = {};
    let currentMuscle1 = 'chest', currentMuscle2 = 'triceps', exercises = [];
    const maleLib = {
        chest: ["Жим штанги лёжа","Жим гантелей лёжа","Разводка гантелей"],
        back: ["Тяга верхнего блока","Тяга штанги в наклоне","Горизонтальная тяга"],
        legs: ["Приседания","Жим ногами","Разгибание ног"],
        shoulders: ["Жим гантелей сидя","Махи в стороны","Шраги"],
        biceps: ["Подъём штанги","Молоточки","Концентрированный подъём"],
        triceps: ["Разгибание на блоке","Кикбэк","Французский жим"]
    };
    const femaleLib = {
        chest: ["Жим гантелей лёжа (лёгк)","Сведение рук","Отжимания с колен"],
        back: ["Тяга верхнего блока","Горизонтальная тяга","Гиперэкстензия"],
        legs: ["Приседания с гантелями","Ягодичный мостик","Выпады"],
        shoulders: ["Жим гантелей (лёгк)","Махи в стороны","Шраги с гантелями"],
        biceps: ["Подъём гантелей","Молоточки","Концентрированный"],
        triceps: ["Разгибание на блоке","Кикбэк","Отжимания от скамьи"]
    };
    function getLib() { return currentGender === 'male' ? maleLib : femaleLib; }
    function generateExercises() {
        const lib = getLib();
        let ex = [];
        for (let name of lib[currentMuscle1].slice(0,3)) ex.push({ name, sets:0, weight:0, reps:0 });
        for (let name of lib[currentMuscle2].slice(0,3)) ex.push({ name, sets:0, weight:0, reps:0 });
        return ex;
    }
    function render() {
        const cont = document.getElementById('exercisesContainer');
        cont.innerHTML = '';
        exercises.forEach((ex, i) => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${ex.name}</b>
                    <button class="del-ex" data-index="${i}" style="background:#ff6b6b; padding:4px 12px;">Удалить</button>
                </div>
                <div class="input-group">
                    <input type="number" placeholder="Подходы" data-type="sets" data-index="${i}" value="${ex.sets}">
                    <input type="number" placeholder="Вес (кг)" data-type="weight" data-index="${i}" value="${ex.weight}">
                    <input type="number" placeholder="Повторения" data-type="reps" data-index="${i}" value="${ex.reps}">
                </div>
                <div class="comment" id="comment-${i}"></div>
            `;
            cont.appendChild(card);
        });
        document.querySelectorAll('.del-ex').forEach(btn => {
            btn.onclick = () => { exercises.splice(parseInt(btn.dataset.index),1); render(); };
        });
        document.querySelectorAll('.input-group input').forEach(inp => {
            inp.onchange = () => {
                const idx = parseInt(inp.dataset.index);
                const type = inp.dataset.type;
                let val = parseFloat(inp.value) || 0;
                if(val<0) val=0;
                if(type==='sets' && val>6) val=6;
                exercises[idx][type] = val;
                document.getElementById(`comment-${idx}`).innerText = `Совет: рабочий диапазон. ${type==='weight' && val>0 ? 'Вес учтён' : ''}`;
            };
        });
    }
    function applySelection() {
        currentMuscle1 = document.getElementById('muscle1').value;
        currentMuscle2 = document.getElementById('muscle2').value;
        exercises = generateExercises();
        render();
    }
    function saveData() {
        const data = { muscle1:currentMuscle1, muscle2:currentMuscle2, exercises, date:new Date().toISOString() };
        let history = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
        history.push(data);
        localStorage.setItem(`history_${currentUser}`, JSON.stringify(history));
        localStorage.setItem(`trainings_${currentUser}`, JSON.stringify(data));
        alert('Сохранено!');
    }
    function loadUserData() {
        const saved = localStorage.getItem(`trainings_${currentUser}`);
        if(saved) {
            const data = JSON.parse(saved);
            exercises = data.exercises;
            currentMuscle1 = data.muscle1;
            currentMuscle2 = data.muscle2;
            document.getElementById('muscle1').value = currentMuscle1;
            document.getElementById('muscle2').value = currentMuscle2;
        } else exercises = generateExercises();
        render();
    }
    function showHistory() {
        const history = JSON.parse(localStorage.getItem(`history_${currentUser}`) || '[]');
        if(!history.length) { alert('История пуста'); return; }
        let txt = '';
        history.forEach((h,i) => { txt += `${i+1}. ${new Date(h.date).toLocaleString()}\n`; });
        const idx = prompt(`📋 История тренировок:\n${txt}\nВведите номер для деталей:`);
        if(idx && history[idx-1]) {
            let det = `${new Date(history[idx-1].date).toLocaleString()}\n\n`;
            for(let ex of history[idx-1].exercises) det += `${ex.name}: ${ex.sets}×${ex.weight}×${ex.reps}\n`;
            alert(det);
        }
    }
    function validateProfile() {
        const h=document.getElementById('height').value, w=document.getElementById('weight').value, a=document.getElementById('age').value;
        document.getElementById('saveProfileBtn').disabled = !(h>0 && w>0 && a>0);
    }
    document.getElementById('loginBtn').onclick = () => {
        let login = document.getElementById('login').value.trim();
        let pass = document.getElementById('password').value;
        if(!login || !pass) { alert('Введите логин и пароль'); return; }
        let users = JSON.parse(localStorage.getItem('users')||'{}');
        if(users[login] && users[login]===pass) {
            currentUser = login;
            let savedGender = localStorage.getItem(`gender_${currentUser}`);
            let savedProfile = localStorage.getItem(`profile_${currentUser}`);
            if(savedGender && savedProfile) {
                currentGender = savedGender;
                userProfile = JSON.parse(savedProfile);
                document.getElementById('authScreen').style.display='none';
                document.getElementById('mainApp').style.display='block';
                loadUserData();
            } else {
                document.getElementById('authScreen').style.display='none';
                document.getElementById('genderScreen').style.display='block';
            }
        } else alert('Неверный логин или пароль');
    };
    document.getElementById('registerBtn').onclick = () => {
        let login = document.getElementById('login').value.trim();
        let pass = document.getElementById('password').value;
        if(!login || !pass) { alert('Введите логин и пароль'); return; }
        let users = JSON.parse(localStorage.getItem('users')||'{}');
        if(users[login]) { alert('Пользователь уже есть'); return; }
        users[login]=pass; localStorage.setItem('users',JSON.stringify(users));
        currentUser=login;
        document.getElementById('authScreen').style.display='none';
        document.getElementById('genderScreen').style.display='block';
    };
    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.onclick = () => {
            currentGender = btn.dataset.gender;
            localStorage.setItem(`gender_${currentUser}`, currentGender);
            document.getElementById('genderScreen').style.display='none';
            document.getElementById('profileScreen').style.display='block';
        };
    });
    document.getElementById('saveProfileBtn').onclick = () => {
        let height = parseInt(document.getElementById('height').value);
        let weight = parseInt(document.getElementById('weight').value);
        let age = parseInt(document.getElementById('age').value);
        let level = document.getElementById('level').value;
        let goal = document.getElementById('goal').value;
        if(height>0 && weight>0 && age>0) {
            userProfile = {height,weight,age,level,goal};
            localStorage.setItem(`profile_${currentUser}`, JSON.stringify(userProfile));
            document.getElementById('profileScreen').style.display='none';
            document.getElementById('mainApp').style.display='block';
            exercises = generateExercises();
            render();
        }
    };
    document.getElementById('backToGenderBtn').onclick = () => {
        document.getElementById('profileScreen').style.display='none';
        document.getElementById('genderScreen').style.display='block';
    };
    document.getElementById('applyBtn').onclick = applySelection;
    document.getElementById('saveBtn').onclick = saveData;
    document.getElementById('historyBtn').onclick = showHistory;
    document.getElementById('logoutBtn').onclick = () => { currentUser=null; window.location.reload(); };
    document.getElementById('addExerciseBtn').onclick = () => {
        let newName = prompt('Название упражнения:');
        if(newName) exercises.push({ name:newName, sets:0, weight:0, reps:0 });
        render();
    };
    ['height','weight','age'].forEach(id => {
        document.getElementById(id).oninput = validateProfile;
    });
</script>
</body>
</html>
